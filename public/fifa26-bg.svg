  <!-- bronze bottom-left -->
  <rect x="-30" y="470" width="400" height="300" rx="44" fill="#a6781f"/>

  <!-- dark tan bottom-center -->
  <rect x="300" y="568" width="540" height="200" rx="100" fill="#8a6a2f"/>
</svg>
